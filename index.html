<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff8f1">
    <meta name="description" content="Motive — A mindful screen time app for iOS. Coming soon.">
    <meta property="og:title" content="Motive — Don't just block. Understand why.">
    <meta property="og:description" content="A mindful screen time app for iOS. Coming soon.">
    <title>Motive — Understand why you scroll</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fff8f1;
            --text: #1a1a1a;
            --text-muted: #6b6155;
            --accent: #ea580c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }

        nav {
            padding: 28px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }

        .nav-link {
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 32px;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(234, 88, 12, 0.08);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 32px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            line-height: 1.02;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
            max-width: 900px;
        }

        h1 .accent {
            color: var(--accent);
            font-style: italic;
        }

        p.tagline {
            font-size: clamp(16px, 1.8vw, 19px);
            color: var(--text-muted);
            max-width: 520px;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: var(--text);
            color: var(--bg);
            text-decoration: none;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.15s;
        }

        .cta:hover { transform: translateY(-1px); }
        .cta:active { transform: translateY(0); }

        footer {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            nav, footer { padding: 20px 24px; }
            main { padding: 0 24px; }
            footer {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            h1 { margin-bottom: 20px; }
            p.tagline { margin-bottom: 32px; }
            .badge { margin-bottom: 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <span class="logo"><span class="logo-dot"></span>Motive</span>
        <a href="mailto:tass.mehmetcan@gmail.com?subject=Motive%20Waitlist" class="nav-link">Contact</a>
    </nav>

    <main>
        <span class="badge">Coming to iOS — 2026</span>
        <h1>Don't just block.<br><span class="accent">Understand why.</span></h1>
        <p class="tagline">A mindful screen time app that helps you see your patterns, recognize your triggers, and finally take back your time.</p>
        <a href="mailto:tass.mehmetcan@gmail.com?subject=Motive%20Waitlist&body=I'd%20like%20to%20be%20notified%20when%20Motive%20launches." class="cta">
            Join the waitlist
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M5 12h14M13 5l7 7-7 7"/>
            </svg>
        </a>
    </main>

    <footer>
        <span>© 2026 Motive</span>
        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
        </div>
    </footer>

</body>
</html>
